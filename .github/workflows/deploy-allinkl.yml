# Nach jedem Push auf main: Build + Upload per SSH/rsync auf all-inkl (Webroot der Subdomain).
#
# GitHub → Repository → Settings → Secrets and variables → Actions:
#   SSH_PRIVATE_KEY   Inhalt der privaten Deploy-Key-Datei (BEGIN … END)
#   SSH_HOST          z. B. w00d7d54.kasserver.com
#   SSH_USER          z. B. ssh-w00d7d54
#   REMOTE_WEBROOT    Absoluter Pfad zum Document Root, z. B. /www/htdocs/altbaufinder.markusgerke.com
#                     (genau den Pfad aus KAS/FTP ermitteln; mit / enden)
#
# Auf dem Server muss api/config.php manuell liegen (nicht im Repo). rsync überschreibt sie nicht.

name: Deploy all-inkl

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install & build
        run: npm ci && npm run build
        env:
          VITE_API_URL: https://altbaufinder.markusgerke.com/api

      - name: SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Rsync frontend (dist/)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_WEBROOT }}/"

      - name: Rsync API (ohne config.php)
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude='config.php' \
            api/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_WEBROOT }}/api/"
