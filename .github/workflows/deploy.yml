# Push auf main → Build + Deploy per SSH (rsync) auf all-inkl.
#
# Secrets (Repository → Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY   Inhalt der privaten Deploy-Key-Datei
#   SSH_HOST          z. B. w00d7d54.kasserver.com
#   SSH_USER          z. B. ssh-w00d7d54
#   REMOTE_WEBROOT    Absoluter Pfad zum Webroot, mit / am Ende

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      REMOTE_WEBROOT: ${{ secrets.REMOTE_WEBROOT }}
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'
          cache: npm

      - name: Install & build
        run: npm ci && npm run build
        env:
          VITE_API_URL: https://altbaufinder.markusgerke.com/api

      - name: API für Upload (ohne config.php)
        run: |
          mkdir -p api-release/migrations api-release/auth
          cp api/classifications.php api/db.php api/schema.sql api/config.example.php api/health.php api/jwt.php api/auth_helpers.php api/leaderboard.php api/mail_send.php api-release/
          cp api/auth/register.php api/auth/login.php api/auth/me.php \
            api/auth/password-request-reset.php api/auth/password-reset.php \
            api/auth/account-update-email.php api/auth/account-update-display-name.php api/auth/account-update-password.php api/auth/account-delete.php \
            api-release/auth/
          cp api/migrations/*.sql api-release/migrations/

      - name: Deploy per SSH (rsync)
        if: env.SSH_PRIVATE_KEY != '' && env.SSH_HOST != '' && env.SSH_USER != '' && env.REMOTE_WEBROOT != ''
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete --exclude 'api/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            dist/ "${SSH_USER}@${SSH_HOST}:${REMOTE_WEBROOT}"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            api-release/ "${SSH_USER}@${SSH_HOST}:${REMOTE_WEBROOT}api/"
